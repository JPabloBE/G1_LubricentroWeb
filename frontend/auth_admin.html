<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Staff | Lubricentro</title>

  <!-- Barlow Condensed + DM Sans — igual que index.html -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    /* ── Variables idénticas a main.css ── */
    :root {
      --bg-base:        #0C0D11;
      --bg-surface:     #13141A;
      --bg-elevated:    #1B1D25;
      --accent-red:     #FF3B1F;
      --accent-gold:    #E8A030;
      --accent-gold-dim: rgba(232,160,48,.12);
      --text-primary:   #F2F2F4;
      --text-muted:     #8A8D9A;
      --border:         rgba(255,255,255,.07);
      --border-bright:  rgba(255,255,255,.13);
      --font-display:  "Barlow Condensed", sans-serif;
      --font-body:     "DM Sans", system-ui, -apple-system, sans-serif;
      --ease-out-expo: cubic-bezier(0.22,1,0.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Sin scroll — todo en viewport */
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      /* Fondo más oscuro + grid dorado sutil — diferencia visual respecto al portal cliente */
      background: #080A0F;
      background-image:
        linear-gradient(rgba(232,160,48,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,160,48,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      color: var(--text-primary);
    }

    /* ── Nav — mismo .mainnav, borde dorado para diferenciar ── */
    .auth-nav {
      background: rgba(8,10,15,.97);
      border-bottom: 2px solid var(--accent-gold);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .auth-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .auth-nav img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    /* Badge central — simétrico con el logo */
    .auth-nav-badge {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-family: var(--font-body);
    }
    .auth-nav-badge i { color: var(--accent-gold); font-size: 13px; }

    @media (max-width: 575px) {
      .auth-nav-badge { display: none; }
      .auth-nav-inner { justify-content: space-between; }
    }

    /* Back link — navlink puro sin borde (igual que auth_client) */
    .auth-nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(242,242,244,.7);
      font-family: var(--font-body);
      font-size: 13.5px;
      font-weight: 600;
      text-decoration: none;
      padding: 7px 12px;
      border-radius: 5px;
      transition: color .2s, background .2s;
      letter-spacing: .01em;
    }
    .auth-nav-back:hover {
      color: #fff;
      background: var(--accent-gold-dim);
    }
    .auth-nav-back i { font-size: 13px; }

    /* ── Layout centrado, sin scroll ── */
    .auth-main {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      position: relative;
    }

    /* Línea degradada superior — igual que .section-trust::before */
    .auth-main::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold) 50%, transparent);
      opacity: .4;
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    /* ── Ícono de escudo central ── */
    .auth-shield-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .auth-shield {
      width: 68px;
      height: 68px;
      border-radius: 14px;
      background: var(--accent-gold-dim);
      border: 1px solid rgba(232,160,48,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--accent-gold);
      position: relative;
    }

    /* Pulso sutil alrededor del escudo */
    .auth-shield::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 19px;
      border: 1px solid rgba(232,160,48,.15);
      pointer-events: none;
    }

    /* Eyebrow — igual que index.html pero en dorado */
    .auth-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-gold);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .14em;
      margin-bottom: 12px;
      justify-content: center;
      width: 100%;
    }
    .auth-eyebrow::before {
      content: "";
      display: inline-block;
      width: 20px;
      height: 2px;
      background: var(--accent-gold);
      flex-shrink: 0;
    }
    .auth-eyebrow::after {
      content: "";
      display: inline-block;
      width: 20px;
      height: 2px;
      background: var(--accent-gold);
      flex-shrink: 0;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 3.5vw, 40px);
      font-weight: 900;
      color: var(--text-primary);
      text-transform: uppercase;
      line-height: 1.0;
      letter-spacing: -.5px;
      margin: 0 0 6px;
      text-align: center;
    }

    .auth-sub {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0 0 18px;
      line-height: 1.5;
      text-align: center;
    }

    /* Badge de advertencia */
    .auth-warning {
      display: flex;
      align-items: center;
      gap: 9px;
      background: rgba(232,160,48,.07);
      border: 1px solid rgba(232,160,48,.2);
      border-radius: 7px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 12.5px;
      color: rgba(232,160,48,.85);
      font-weight: 500;
    }
    .auth-warning i { font-size: 15px; flex-shrink: 0; color: var(--accent-gold); }

    /* Card — borde dorado en lugar de rojo */
    .auth-card {
      background: var(--bg-elevated);
      border-radius: 10px;
      border: 1px solid var(--border-bright);
      border-top: 3px solid var(--accent-gold);
      padding: 22px 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(232,160,48,.05);
    }

    /* Mensaje */
    .message {
      padding: 10px 14px;
      border-radius: 7px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      font-family: var(--font-body);
    }
    .message.error   {
      background: rgba(255,59,31,.08);
      border: 1px solid rgba(255,59,31,.3);
      color: #ff6b52;
    }
    .message.success {
      background: rgba(22,163,74,.1);
      border: 1px solid rgba(22,163,74,.3);
      color: #4ade80;
    }

    /* Formulario */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border-bright);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      background: var(--bg-surface);
      transition: border-color .15s, box-shadow .15s;
    }

    .form-group input::placeholder { color: rgba(138,141,154,.45); }

    .form-group input:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px rgba(232,160,48,.12);
    }

    /* Botón — dorado en lugar de rojo */
    .btn-auth {
      position: relative;
      width: 100%;
      padding: 12px;
      background: var(--accent-gold);
      color: #0C0D11;
      border: 2px solid transparent;
      border-radius: 6px;
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      margin-top: 4px;
      overflow: hidden;
      transition: background .22s var(--ease-out-expo), transform .22s, box-shadow .22s;
    }

    .btn-auth::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,.2), transparent);
      transition: left .45s var(--ease-out-expo);
      pointer-events: none;
    }

    .btn-auth:hover {
      background: #d4911e;
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(232,160,48,.35);
    }
    .btn-auth:hover::before { left: 140%; }

    /* Footer links */
    .auth-footer-links {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      text-align: center;
    }

    .auth-footer-links .hint {
      font-size: 12px;
      color: rgba(138,141,154,.7);
      line-height: 1.5;
      max-width: 300px;
    }

    .auth-footer-links .nav-link-row {
      font-size: 12.5px;
      color: var(--text-muted);
    }

    .auth-footer-links a {
      color: var(--accent-gold);
      font-weight: 700;
      text-decoration: none;
    }
    .auth-footer-links a:hover { text-decoration: underline; }

    /* Separador */
    .auth-footer-links .sep {
      width: 40px;
      height: 1px;
      background: var(--border-bright);
      margin: 4px auto;
    }
  </style>
  <script src="./assets/js/config.js"></script>
</head>

<body>

  <!-- Nav -->
  <nav class="auth-nav">
    <div class="auth-nav-inner">
      <a href="./index.html">
        <img src="./assets/img/logo_white.png" alt="Lubricentro">
      </a>
      <div class="auth-nav-badge">
        <i class="bi bi-shield-lock-fill"></i> Zona Restringida
      </div>
      <a href="./index.html" class="auth-nav-back">
        <i class="bi bi-arrow-left"></i> Volver al inicio
      </a>
    </div>
  </nav>

  <!-- Main -->
  <main class="auth-main">
    <div class="auth-wrap">

      <!-- Ícono de escudo -->
      <div class="auth-shield-wrap">
        <div class="auth-shield">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
      </div>

      <!-- Eyebrow centrado con líneas a ambos lados -->
      <div class="auth-eyebrow">Zona Restringida</div>

      <h1 class="auth-title">Acceso Staff</h1>
      <p class="auth-sub">Ingresá con tus credenciales de personal autorizado.</p>

      <div class="auth-card">

        <!-- Badge de advertencia -->
        <div class="auth-warning">
          <i class="bi bi-exclamation-triangle-fill"></i>
          Acceso exclusivo para personal autorizado del lubricentro.
        </div>

        <div id="message" class="message"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="login-username">Usuario</label>
            <input type="text" id="login-username" placeholder="nombre de usuario" required />
          </div>
          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-auth">Ingresar <i class="bi bi-arrow-right ms-1"></i></button>
        </form>

        <div class="auth-footer-links">
          <div class="sep"></div>
          <span class="hint">Si necesitás un usuario, pedile a un admin que lo cree desde el dashboard.</span>
          <div class="sep"></div>
          <span class="nav-link-row">¿Sos cliente? <a href="./auth_client.html">Ir al portal cliente</a></span>
        </div>

      </div>
    </div>
  </main>

  <script>
    const API_URL = ((window.APP_CONFIG && window.APP_CONFIG.API_BASE) || "http://localhost:8000") + "/api/auth";
    let accessToken = localStorage.getItem("access_token");

    function showMessage(text, type) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = `message ${type}`;
      el.style.display = "block";
    }

    function hideMessage() {
      document.getElementById("message").style.display = "none";
    }

    function isAdminUser(me) {
      return me.user_type === "admin" || me.is_staff === true || me.is_superuser === true;
    }

    async function tryAutoRedirect() {
      if (!accessToken) return;
      try {
        const meRes = await fetch(`${API_URL}/me/`, {
          headers: { "Authorization": `Bearer ${accessToken}` }
        });
        if (!meRes.ok) {
          localStorage.removeItem("access_token");
          localStorage.removeItem("refresh_token");
          return;
        }
        const me = await meRes.json().catch(() => null);
        if (!me || !isAdminUser(me)) {
          localStorage.removeItem("access_token");
          localStorage.removeItem("refresh_token");
          showMessage("Tu usuario no tiene permisos de Staff/Admin.", "error");
          return;
        }
        window.location.href = "./admin/dashboard.html";
      } catch (_) {}
    }

    tryAutoRedirect();

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideMessage();

      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;

      try {
        const res = await fetch(`${API_URL}/login/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showMessage(data.detail || "Error: Solo staff/admin pueden iniciar sesión.", "error");
          return;
        }

        if (!data.access) {
          showMessage("No se recibió access_token.", "error");
          return;
        }

        localStorage.setItem("access_token", data.access);
        if (data.refresh) localStorage.setItem("refresh_token", data.refresh);
        accessToken = data.access;

        const meRes = await fetch(`${API_URL}/me/`, {
          headers: { "Authorization": `Bearer ${accessToken}` }
        });

        if (!meRes.ok) {
          showMessage("No se pudo validar la sesión.", "error");
          localStorage.removeItem("access_token");
          localStorage.removeItem("refresh_token");
          return;
        }

        const me = await meRes.json().catch(() => null);
        if (!me || !isAdminUser(me)) {
          showMessage("Este usuario no tiene permisos de Staff/Admin.", "error");
          localStorage.removeItem("access_token");
          localStorage.removeItem("refresh_token");
          return;
        }

        window.location.href = "./admin/dashboard.html";
      } catch (err) {
        console.error(err);
        showMessage("Error de conexión con el servidor.", "error");
      }
    });
  </script>
</body>
</html>
