<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cliente | Expediente del Vehículo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/client.css">

  <style>
    /* ── Back link ── */
    .back-link {
      display:        inline-flex;
      align-items:    center;
      gap:            6px;
      color:          var(--text-muted);
      font-family:    var(--font-body);
      font-size:      13px;
      font-weight:    600;
      text-decoration: none;
      margin-bottom:  18px;
      transition:     color .15s;
    }
    .back-link:hover { color: var(--text-primary); }

    /* ── WO entry totals ── */
    .wo-totals-row {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      padding:         5px 0;
      font-size:       12.5px;
    }
    .wo-totals-label { color: var(--text-muted); }
    .wo-totals-val   { color: var(--text-primary); font-weight: 600; }

    /* ── Expand button ── */
    .btn-wo-details {
      display:         inline-flex;
      align-items:     center;
      gap:             6px;
      background:      var(--bg-surface);
      color:           var(--text-muted);
      border:          1px solid var(--border-bright);
      border-radius:   6px;
      padding:         6px 14px;
      font-family:     var(--font-body);
      font-size:       12.5px;
      font-weight:     700;
      cursor:          pointer;
      text-decoration: none;
      transition:      background .15s, color .15s;
    }
    .btn-wo-details:hover { background: var(--bg-elevated); color: var(--text-primary); }

    /* ── WO timeline number badge ── */
    .wo-entry-num {
      font-family:    var(--font-display);
      font-size:      11px;
      font-weight:    700;
      color:          var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    /* ── Vehicle profile card ── */
    .veh-profile {
      display:     flex;
      align-items: center;
      gap:         20px;
      padding:     18px 22px;
    }

    .veh-profile-thumb {
      flex-shrink:     0;
      width:           72px;
      height:          72px;
      border-radius:   8px;
      overflow:        hidden;
      background:      rgba(0,0,0,.3);
      border:          1px solid var(--border-bright);
      display:         flex;
      align-items:     center;
      justify-content: center;
    }

    .veh-profile-thumb img {
      width:      100%;
      height:     100%;
      object-fit: cover;
    }

    .veh-profile-thumb-icon {
      font-size:               2rem;
      background:              linear-gradient(135deg, var(--accent-gold) 0%, rgba(232,160,48,.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip:         text;
    }

    .veh-profile-info { flex: 1; min-width: 0; }
  </style>
</head>

<body>

  <!-- ══ TOPBAR ══ -->
  <header class="topbar">
    <div class="container d-flex align-items-center justify-content-between gap-3">
      <a class="brand text-decoration-none" href="../index.html">
        <img class="brand-logo" src="../assets/img/logo.png" alt="Lubricentro">
      </a>
      <div class="topbar-info d-none d-md-flex align-items-center gap-4">
        <div class="info-chip">
          <div class="info-icon"><i class="bi bi-telephone"></i></div>
          <div>
            <div class="info-label">¡Llámanos ahora!</div>
            <div class="info-value">+(506) 2443-6139</div>
          </div>
        </div>
        <div class="info-chip">
          <div class="info-icon"><i class="bi bi-clock"></i></div>
          <div>
            <div class="info-label">Horario de atención</div>
            <div class="info-value">Lun-Sáb : 09:00-19:00</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ══ MAINNAV ══ -->
  <nav class="mainnav">
    <div class="container d-flex align-items-center">
      <ul class="navlinks d-none d-lg-flex">
        <li><a href="./dashboard.html">Dashboard</a></li>
        <li><a href="./appointments.html">Mis Citas</a></li>
        <li><a class="active" href="./vehicles.html">Mis Autos</a></li>
      </ul>
      <button class="btn btn-sm btn-outline-light ms-auto d-lg-none" id="btnMobileMenu" type="button" aria-label="Menú">
        <i class="bi bi-list"></i>
      </button>
      <div class="nav-user d-none d-lg-flex">
        <div class="notif-wrap">
          <button class="btn-notif-bell" id="btnNotifBell" title="Notificaciones" aria-label="Notificaciones">
            <i class="bi bi-bell"></i>
            <span class="notif-count" id="notifCount"></span>
          </button>
          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-dd-header"><i class="bi bi-bell me-1"></i>Recordatorios</div>
            <div id="notifList"><div class="notif-empty">Sin recordatorios pendientes</div></div>
          </div>
        </div>
        <span class="nav-user-name" id="whoami"></span>
        <button class="btn-logout" id="btnLogout">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button>
      </div>
    </div>
    <div class="mobile-drawer" id="mobileDrawer">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./appointments.html">Mis Citas</a>
      <a class="active" href="./vehicles.html">Mis Autos</a>
      <a href="#" id="btnLogoutMobile" style="color:#ffc107;">Cerrar sesión</a>
    </div>
  </nav>

  <!-- ══ MAIN ══ -->
  <main class="container py-4">
    <a class="back-link" href="./vehicles.html">
      <i class="bi bi-arrow-left"></i> Mis Autos
    </a>

    <div id="msg" class="alert d-none" role="alert"></div>

    <div id="heroWrap"></div>

    <div class="section-header mb-3" id="historialHeader" style="display:none;">
      <span class="section-label">Historial de servicios</span>
      <button class="btn-reload" id="btnReload">
        <i class="bi bi-arrow-clockwise"></i> Actualizar
      </button>
    </div>

    <div id="list" class="d-grid gap-3"></div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/toast.js"></script>
<script>
  const API_BASE = "http://127.0.0.1:8000";
  const token = localStorage.getItem("customer_access_token");
  const plate = new URLSearchParams(location.search).get("plate") || "";

  function showMsg(text, type = "danger") { showToast(text, type); }

  async function fetchJSON(url, options = {}) {
    const res = await fetch(url, options);
    let data = null;
    try { data = await res.json(); } catch (_) {}
    if (!res.ok) {
      const err = new Error(data?.detail || res.statusText || `HTTP ${res.status}`);
      err.status = res.status;
      throw err;
    }
    return data;
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function fmt(dt) {
    if (!dt) return "—";
    try { return new Date(dt).toLocaleString("es-CR", { dateStyle: "medium", timeStyle: "short" }); }
    catch (_) { return dt; }
  }

  function money(v) {
    if (v === null || v === undefined || v === "") return "—";
    const n = Number(v);
    if (Number.isNaN(n)) return String(v);
    return n.toLocaleString("es-CR", { style: "currency", currency: "CRC" });
  }

  const WO_STATUS_LABELS = {
    open:                   "Abierta",
    diagnosing:             "Diagnóstico",
    awaiting_authorization: "Esperando autorización",
    authorized:             "Autorizada",
    in_progress:            "En progreso",
    waiting_parts:          "Esperando repuestos",
    ready:                  "Lista para retirar",
    closed:                 "Cerrada",
    cancelled:              "Cancelada",
    canceled:               "Cancelada",
  };

  function woStatusLabel(status) {
    const s = String(status || "").toLowerCase();
    return WO_STATUS_LABELS[s] || status || "—";
  }

  function badgeClass(status) {
    const s = String(status || "").toLowerCase();
    if (["ready", "closed", "done", "completed"].includes(s)) return "text-bg-success";
    if (["cancelled", "canceled"].includes(s)) return "text-bg-danger";
    if (["open", "diagnosing", "in_progress", "waiting_parts", "awaiting_authorization", "authorized"].includes(s)) return "text-bg-primary";
    return "text-bg-secondary";
  }

  function renderLineTable(lines, kind) {
    if (!lines || !lines.length) return `<p style="font-size:12.5px;color:var(--text-muted);margin:0;">No hay ${kind} registrados.</p>`;
    const rows = lines.map(ln => {
      const name = kind === "servicios" ? (ln.service_name || "Servicio") : (ln.product_name || "Producto");
      const sub  = kind === "productos" && ln.product_sku ? `SKU: ${escapeHtml(ln.product_sku)}` : "";
      const desc = ln.description ? escapeHtml(ln.description) : "";
      return `
        <tr>
          <td>
            <div class="line-name">${escapeHtml(name)}</div>
            ${sub  ? `<div class="line-sub">${sub}</div>`  : ""}
            ${desc ? `<div class="line-sub">${desc}</div>` : ""}
          </td>
          <td style="text-align:center;white-space:nowrap;">${escapeHtml(String(ln.qty ?? 1))}</td>
          <td class="line-amount">${escapeHtml(money(ln.unit_price))}</td>
          <td class="line-amount">${escapeHtml(money(ln.line_total))}</td>
        </tr>`;
    }).join("");
    return `
      <table class="line-table">
        <thead>
          <tr>
            <th>Descripción</th>
            <th style="text-align:center;">Cant.</th>
            <th style="text-align:right;">Unit.</th>
            <th style="text-align:right;">Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderWoCard(wo, idx) {
    const status = wo.status || "—";
    const services = wo.services || [];
    const products  = wo.products  || [];
    const computedTotal = money(wo.computed_total);
    const servicesTotal = money(wo.services_total);
    const productsTotal = money(wo.products_total);
    const collapseId = `woDetails_${wo.work_order_id || idx}`;

    return `
      <div class="wo-card">
        <div class="wo-card-header">
          <div>
            <div class="wo-entry-num">Visita #${idx + 1}</div>
            <div class="wo-card-dates" style="margin-top:4px;">
              <i class="bi bi-calendar3" style="margin-right:4px;"></i>
              ${escapeHtml(fmt(wo.opened_at))}
              ${wo.closed_at ? ` <span style="color:var(--border-bright);">·</span> Cerrada: ${escapeHtml(fmt(wo.closed_at))}` : ""}
            </div>
            ${wo.customer_symptoms ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;">${escapeHtml(wo.customer_symptoms)}</div>` : ""}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <span class="badge ${badgeClass(status)}">${escapeHtml(woStatusLabel(status))}</span>
            <span style="color:var(--accent-gold);font-family:var(--font-display);font-weight:800;font-size:15px;">${escapeHtml(computedTotal)}</span>
          </div>
        </div>

        <div class="wo-card-footer">
          <button class="btn-wo-details" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false">
            <i class="bi bi-chevron-down"></i> Ver detalle
          </button>
          <span class="badge text-bg-secondary">${services.length} servicio${services.length !== 1 ? "s" : ""}</span>
          <span class="badge text-bg-secondary">${products.length} producto${products.length !== 1 ? "s" : ""}</span>
        </div>

        <div class="collapse" id="${collapseId}">
          <div style="padding:16px 20px 20px;border-top:1px solid var(--border);">
            ${services.length ? `
              <div class="field-label mb-2">Servicios</div>
              ${renderLineTable(services, "servicios")}
              <div style="height:16px;"></div>` : ""}
            ${products.length ? `
              <div class="field-label mb-2">Productos</div>
              ${renderLineTable(products, "productos")}
              <div style="height:16px;"></div>` : ""}
            ${!services.length && !products.length ? `<p style="font-size:12.5px;color:var(--text-muted);margin:0;">Sin servicios ni productos registrados.</p>` : ""}
            ${(services.length || products.length) ? `
              <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;">
                ${services.length ? `<div class="wo-totals-row"><span class="wo-totals-label">Subtotal servicios</span><span class="wo-totals-val">${escapeHtml(servicesTotal)}</span></div>` : ""}
                ${products.length ? `<div class="wo-totals-row"><span class="wo-totals-label">Subtotal productos</span><span class="wo-totals-val">${escapeHtml(productsTotal)}</span></div>` : ""}
                <div class="wo-totals-row" style="padding-top:8px;border-top:1px solid var(--border);margin-top:4px;">
                  <span style="color:var(--text-muted);font-size:13px;">Total calculado</span>
                  <span style="color:var(--accent-gold);font-family:var(--font-display);font-weight:800;font-size:16px;">${escapeHtml(computedTotal)}</span>
                </div>
              </div>` : ""}
            ${wo.diagnosis ? `<div class="field-row mt-3" style="margin-bottom:0;"><div class="field-label">Diagnóstico</div><div class="field-val">${escapeHtml(wo.diagnosis)}</div></div>` : ""}
            ${wo.notes ? `<div class="field-row" style="margin-bottom:0;"><div class="field-label">Notas</div><div class="field-val">${escapeHtml(wo.notes)}</div></div>` : ""}
          </div>
        </div>
      </div>`;
  }

  function renderHero(v) {
    const name = [v.make, v.model].filter(Boolean).join(" ") || "Vehículo";
    const thumb = v.image_url
      ? `<img src="${escapeHtml(v.image_url)}" alt="${escapeHtml(v.plate)}"
             onerror="this.parentNode.innerHTML='<i class=&quot;bi bi-car-front-fill veh-profile-thumb-icon&quot;></i>'">`
      : `<i class="bi bi-car-front-fill veh-profile-thumb-icon"></i>`;

    return `
      <div class="hero-card mb-4">
        <div class="hero-card-accent"></div>
        <div class="veh-profile">
          <div class="veh-profile-thumb">${thumb}</div>
          <div class="veh-profile-info">
            <div class="hero-plate">${escapeHtml(v.plate)}</div>
            <div class="hero-vehicle">${escapeHtml(name)}</div>
            <div class="hero-meta">
              ${v.year ? `<div class="hero-meta-item"><i class="bi bi-calendar-event"></i>${escapeHtml(String(v.year))}</div>` : ""}
              <div class="hero-meta-item"><i class="bi bi-journal-text"></i>Expediente del vehículo</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  async function load() {
    const headers = { "Authorization": `Bearer ${token}` };

    // Fetch vehicles and work orders in parallel
    const [vehiclesData, woData] = await Promise.all([
      fetchJSON(`${API_BASE}/api/customer-vehicles/`, { headers }),
      fetchJSON(`${API_BASE}/api/customer-work-orders/`, { headers }),
    ]);

    const vehicles = Array.isArray(vehiclesData) ? vehiclesData : (vehiclesData.results || []);
    const allWOs   = Array.isArray(woData) ? woData : (woData.results || []);

    // Find the vehicle by plate
    const vehicle = vehicles.find(v => String(v.plate).toUpperCase() === plate.toUpperCase());

    // Render hero
    const heroWrap = document.getElementById("heroWrap");
    if (vehicle) {
      heroWrap.innerHTML = renderHero(vehicle);
    } else {
      // Fallback hero with just the plate
      heroWrap.innerHTML = `
        <div class="hero-card mb-4">
          <div class="hero-card-accent"></div>
          <div class="veh-profile">
            <div class="veh-profile-thumb">
              <i class="bi bi-car-front-fill veh-profile-thumb-icon"></i>
            </div>
            <div class="veh-profile-info">
              <div class="hero-plate">${escapeHtml(plate)}</div>
              <div class="hero-vehicle">Vehículo</div>
              <div class="hero-meta">
                <div class="hero-meta-item"><i class="bi bi-journal-text"></i>Expediente del vehículo</div>
              </div>
            </div>
          </div>
        </div>`;
    }

    // Filter WOs by plate
    const woRows = allWOs
      .filter(wo => String(wo.vehicle_plate || "").toUpperCase() === plate.toUpperCase())
      .sort((a, b) => new Date(b.opened_at) - new Date(a.opened_at));

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!woRows.length) {
      list.innerHTML = `
        <div class="empty-state">
          <i class="bi bi-journal-x"></i>
          <p>No hay servicios registrados para este vehículo todavía.</p>
        </div>`;
      return;
    }

    document.getElementById("historialHeader").style.display = "";

    woRows.forEach((wo, idx) => {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = renderWoCard(wo, idx);
      list.appendChild(wrapper.firstElementChild);
    });
  }

  function logout() {
    localStorage.removeItem("customer_access_token");
    window.location.href = "../auth_client.html";
  }

  document.getElementById("btnReload").addEventListener("click", () => load());
  document.getElementById("btnLogout").addEventListener("click", logout);
  document.getElementById("btnLogoutMobile").addEventListener("click", logout);
  document.getElementById("btnMobileMenu").addEventListener("click", () => {
    document.getElementById("mobileDrawer").classList.toggle("open");
  });

  // Notification bell toggle
  document.getElementById("btnNotifBell").addEventListener("click", (e) => {
    e.stopPropagation();
    document.getElementById("notifDropdown").classList.toggle("open");
  });
  document.addEventListener("click", () => {
    document.getElementById("notifDropdown").classList.remove("open");
  });
  document.getElementById("notifDropdown").addEventListener("click", e => e.stopPropagation());

  (async () => {
    if (!token) {
      window.location.href = "../auth_client.html";
      return;
    }
    if (!plate) {
      showMsg("No se especificó ningún vehículo.", "warning");
      return;
    }

    try {
      const me = await fetchJSON(`${API_BASE}/api/customer-auth/me/`, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      document.getElementById("whoami").textContent = me?.full_name || me?.email || "Cliente";
    } catch (_) {}

    try {
      await load();
    } catch (err) {
      if (err.status === 401) {
        showMsg("Sesión inválida o expirada. Iniciá sesión nuevamente.", "warning");
        setTimeout(() => (window.location.href = "../auth_client.html"), 900);
      } else {
        showMsg("Error al cargar el historial: " + err.message);
      }
    }
  })();
</script>
</body>
</html>
