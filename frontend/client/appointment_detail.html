<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cliente | Detalle de Cita</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/client.css">

  <style>
    /* ── Hero card: layout de dos zonas ── */
    @media (min-width: 768px) {
      .hero-card {
        display: flex !important;
        align-items: stretch;
      }
      .hero-card-body {
        flex: 1;
      }
      .hero-card-visual {
        display: flex !important;
      }
    }

    .hero-card-visual {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 200px;
      padding: 20px 24px;
      background: rgba(0,0,0,.3);
      border-left: 1px solid rgba(255,255,255,.07);
      position: relative;
      overflow: hidden;
    }

    .hero-card-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 50%, rgba(232,160,48,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Con foto real del vehículo */
    .hero-vehicle-img {
      width: 100%;
      max-width: 200px;
      height: 110px;
      object-fit: cover;
      border-radius: 7px;
      opacity: .88;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      transition: opacity .2s;
    }
    .hero-card:hover .hero-vehicle-img { opacity: 1; }

    /* Sin foto: ícono fallback */
    .hero-car-icon {
      font-size: 4rem;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-gold) 0%, rgba(232,160,48,.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 16px rgba(232,160,48,.25));
      transition: filter .25s;
    }
    .hero-card:hover .hero-car-icon {
      filter: drop-shadow(0 4px 22px rgba(232,160,48,.45));
    }

    .hero-car-make {
      font-family: var(--font-display);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.2;
    }

    /* ── Layout de 2 zonas ──
       Desktop:
         1. Hero                    → 100%
         2. Columnas                → Estado+OT (izq ~58%) | Sidebar sticky (der ~42%)
       Móvil: hero → sidebar → Estado → OT
    ── */

    /* Zona de columnas */
    .detail-columns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-main-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-sidebar-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (min-width: 992px) {
      .detail-columns {
        flex-direction: row;
        align-items: stretch;
        gap: 16px;
      }

      /* Sidebar a la derecha (order 2), columnas más parejas */
      .detail-sidebar-col {
        flex: 0 0 38%;
        max-width: 38%;
        order: 2;
      }

      /* El card de detalles ocupa el espacio restante de la sidebar */
      .detail-sidebar-col .sidebar-info-card {
        flex: 1;
      }

      .detail-main-col {
        flex: 1 1 0;
        min-width: 0;
        order: 1;
      }
    }

    /* ── Mensaje del taller ── */
    .msg-card {
      background: rgba(232,160,48,.05);
      border: 1px solid rgba(232,160,48,.18);
      border-left: 4px solid var(--accent-gold);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(232,160,48,.06);
    }

    .msg-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(232,160,48,.12);
      color: var(--accent-gold);
      font-family: var(--font-body);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .msg-card-body {
      padding: 14px 16px 16px;
      font-family: var(--font-body);
      font-size: .88rem;
      color: var(--text-primary);
      line-height: 1.65;
    }

    /* ── Sidebar info card (detalles de la cita) ── */
    .sidebar-info-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      overflow: hidden;
    }

    .sidebar-info-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 16px 9px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .sidebar-info-card-header i {
      color: var(--accent-red);
      font-size: .9rem;
    }

    .sidebar-info-card-body {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Quick-info pills para el sidebar ── */
    .appt-meta-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-bright);
      border-radius: 7px;
      font-family: var(--font-body);
      font-size: .8rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .appt-meta-pill i {
      color: var(--accent-gold);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .appt-meta-pill .pill-label {
      font-size: .65rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      display: block;
      line-height: 1;
      margin-bottom: 2px;
    }

    .appt-meta-pill .pill-val {
      font-size: .82rem;
      color: var(--text-primary);
      font-weight: 500;
      line-height: 1.2;
    }

    /* ── Sidebar section label ── */
    .sidebar-section-label {
      font-family: var(--font-body);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 16px 0 8px;
    }

    .sidebar-section-label:first-child {
      margin-top: 0;
    }

    /* ── Espaciado entre tarjetas del main ── */
    .detail-card + .detail-card {
      margin-top: 12px;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-body);
      font-size: .82rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 18px;
      transition: color .15s;
    }

    .back-link:hover {
      color: var(--text-primary);
    }
  </style>
</head>

<body>

  <!-- ══ TOPBAR ══ -->

    <div class="container d-flex align-items-center justify-content-between gap-3">
      <a class="brand text-decoration-none" href="../index.html">
        <img class="brand-logo" src="../assets/img/logo.png" alt="Lubricentro">
      </a>
      <div class="topbar-info d-none d-md-flex align-items-center gap-4">

  <!-- ══ MAINNAV ══ -->
  <nav class="mainnav">
    <div class="container d-flex align-items-center">
      <ul class="navlinks d-none d-lg-flex">
        <li><a href="./dashboard.html">Dashboard</a></li>
        <li><a class="active" href="./appointments.html">Mis Citas</a></li>
        <li><a href="./vehicles.html">Mis Autos</a></li>
      </ul>
      <button class="btn btn-sm btn-outline-light ms-auto d-lg-none" id="btnMobileMenu" type="button">
        <i class="bi bi-list"></i>
      </button>
      <div class="nav-user d-none d-lg-flex">

  <!-- ══ MAIN ══ -->
  <main class="container py-4">
    <a class="back-link" href="./appointments.html">
      <i class="bi bi-arrow-left"></i>Volver a mis citas
    </a>

    <div id="msg" class="alert d-none" role="alert"></div>
    <div id="content"></div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/toast.js"></script>
<script>
  const API_BASE = "http://127.0.0.1:8000";
  const token   = localStorage.getItem("customer_access_token");

  function authHeaders() {
    return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
  }

  function showMsg(text, type = "danger") { showToast(text, type); }

  async function fetchJSON(url, options = {}) {
    const res = await fetch(url, options);
    let data = null;
    try { data = await res.json(); } catch (_) {}
    if (!res.ok) {
      const detail = data?.detail || res.statusText || `HTTP ${res.status}`;
      const err = new Error(detail);
      err.status = res.status;
      throw err;
    }
    return data;
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function fmt(dt) {
    if (!dt) return "—";
    try { return new Date(dt).toLocaleString("es-CR", { dateStyle: "medium", timeStyle: "short" }); }
    catch (_) { return dt; }
  }

  function money(v) {
    if (v === null || v === undefined || v === "") return "—";
    const n = Number(v);
    if (Number.isNaN(n)) return String(v);
    return n.toLocaleString("es-CR", { style: "currency", currency: "CRC" });
  }

  // ── Status maps ──────────────────────────────────────────────────────────────
  const AP_STATUS_LABELS = {
    pending: "Pendiente de confirmación", scheduled: "Confirmada",
    accepted: "Aceptada", in_progress: "En progreso",
    completed: "Completada", cancelled: "Cancelada",
    no_show: "No se presentó", rejected: "Rechazada",
  };

  function apBadgeClass(status) {
    const s = (status || "").toLowerCase();
    if (s === "pending") return "badge-pending";
    if (["completed", "ready"].includes(s)) return "badge-done";
    if (["cancelled", "rejected", "no_show"].includes(s)) return "badge-cancelled";
    return "badge-active";
  }

  const WO_PROGRESS = {
    open:                   { pct: 25,  label: "Recibimos tu vehículo",        step: 1 },
    diagnosing:             { pct: 25,  label: "Revisando tu vehículo",         step: 1 },
    awaiting_authorization: { pct: 50,  label: "Esperando tu autorización",     step: 2 },
    authorized:             { pct: 50,  label: "Listo para iniciar reparación", step: 2 },
    in_progress:            { pct: 75,  label: "Trabajando en tu vehículo",     step: 3 },
    waiting_parts:          { pct: 75,  label: "Esperando repuestos",           step: 3 },
    ready:                  { pct: 100, label: "¡Listo para retirar!",          step: 4 },
    closed:                 { pct: 100, label: "Orden cerrada",                 step: 4 },
  };

  const STEPS = [
    { label: "Recibido",    icon: "bi-clipboard-check" },
    { label: "Diagnóstico", icon: "bi-search" },
    { label: "Reparación",  icon: "bi-tools" },
    { label: "Listo",       icon: "bi-check-circle-fill" },
  ];

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderProgressBar(wo) {
    const prog = WO_PROGRESS[wo.status] || { pct: 0, label: wo.status, step: 0 };
    const isReady = wo.status === "ready" || wo.status === "closed";
    const fillClass = isReady ? "ready" : "";
    const pctClass  = isReady ? "ready" : "";

    const stepsHtml = STEPS.map((s, i) => {
      const stepNum = i + 1;
      let cls = "";
      if (stepNum < prog.step) cls = "done";
      else if (stepNum === prog.step) cls = isReady ? "ready-step" : "active";
      return `
        <div class="progress-step ${cls}">
          <div class="progress-dot"></div>
          <div class="progress-step-label">${s.label}</div>
        </div>`;
    }).join("");

    return `
      <div class="wo-progress-bar-wrap">
        <div class="wo-bar">
          <div class="wo-bar-fill ${fillClass}" style="width:${prog.pct}%"></div>
        </div>
        <div class="wo-bar-meta">
          <span class="wo-bar-label">${escapeHtml(prog.label)}</span>
          <span class="wo-bar-pct ${pctClass}">${prog.pct}%</span>
        </div>
      </div>
      <div class="progress-track">${stepsHtml}</div>`;
  }

  function renderLineTable(lines, kind) {
    if (!lines || !lines.length) return `<p class="text-muted small mb-0">No hay ${kind} registrados.</p>`;
    const rows = lines.map(ln => {
      const name = kind === "servicios" ? (ln.service_name || "Servicio") : (ln.product_name || "Producto");
      const sub  = kind === "productos" && ln.product_sku ? `SKU: ${escapeHtml(ln.product_sku)}` : "";
      const desc = ln.description ? escapeHtml(ln.description) : "";
      return `
        <tr>
          <td>
            <div class="line-name">${escapeHtml(name)}</div>
            ${sub  ? `<div class="line-sub">${sub}</div>` : ""}
            ${desc ? `<div class="line-sub">${desc}</div>` : ""}
          </td>
          <td style="text-align:center;white-space:nowrap;">${escapeHtml(String(ln.qty ?? 1))}</td>
          <td class="line-amount">${escapeHtml(money(ln.unit_price))}</td>
          <td class="line-amount">${escapeHtml(money(ln.line_total))}</td>
        </tr>`;
    }).join("");
    return `
      <table class="line-table">
        <thead>
          <tr>
            <th>Descripción</th>
            <th style="text-align:center;">Cant.</th>
            <th style="text-align:right;">Unit.</th>
            <th style="text-align:right;">Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderPage(appt, wo, vehicleImgUrl) {
    const status     = (appt.status || "").toLowerCase();
    const label      = AP_STATUS_LABELS[status] || appt.status;
    const badgeClass = apBadgeClass(status);
    const isReady    = wo?.status === "ready" || wo?.status === "closed";
    const cancellable = status === "scheduled";
    const accentClass = isReady ? "ready" : "";

    const vehicle  = [appt.vehicle_make, appt.vehicle_model].filter(Boolean).join(" ") || "Vehículo";
    const plate    = appt.vehicle_plate || "";
    const slotTime = appt.slot_start || appt.scheduled_start;

    // ── Hero: zona visual — foto real o ícono fallback
    const makeLabel = [appt.vehicle_make, appt.vehicle_year].filter(Boolean).join(" · ");
    const vehicleVisual = vehicleImgUrl ? `
      <div class="hero-card-visual">
        <img class="hero-vehicle-img"
             src="${escapeHtml(vehicleImgUrl)}"
             alt="${escapeHtml(plate)}"
             onerror="this.parentNode.innerHTML='<i class=&quot;bi bi-car-front-fill hero-car-icon&quot;></i>${makeLabel ? `<div class=&quot;hero-car-make&quot;>${escapeHtml(makeLabel)}</div>` : ""}'">
      </div>` : `
      <div class="hero-card-visual">
        <i class="bi bi-car-front-fill hero-car-icon"></i>
        ${makeLabel ? `<div class="hero-car-make">${escapeHtml(makeLabel)}</div>` : ""}
      </div>`;

    // ── Hero card completo
    const heroCardHtml = `
      <div class="hero-card">
        <div class="hero-card-accent ${accentClass}"></div>
        <div class="hero-card-body">
          <div class="hero-plate">${escapeHtml(plate)}</div>
          <div class="hero-vehicle">${escapeHtml(vehicle)}</div>
          <div class="hero-meta">
            ${appt.service_name ? `<div class="hero-meta-item"><i class="bi bi-wrench"></i>${escapeHtml(appt.service_name)}</div>` : ""}
            ${slotTime ? `<div class="hero-meta-item"><i class="bi bi-calendar3"></i>${escapeHtml(fmt(slotTime))}</div>` : ""}
          </div>
          <span class="ap-badge ${badgeClass}">${escapeHtml(label)}</span>
        </div>
        ${vehicleVisual}
      </div>`;

    // ── Main: WO status
    let woStatusSection = "";
    let woDetailSection = "";
    if (wo) {
      woStatusSection = `
        <div class="detail-card">
          <div class="detail-card-header">
            <i class="bi bi-speedometer2"></i>
            <h6>Estado de tu vehículo</h6>
          </div>
          <div class="detail-card-body">
            ${renderProgressBar(wo)}
          </div>
        </div>`;

      const services = wo.services || [];
      const products  = wo.products  || [];
      const hasLines  = services.length || products.length;
      const hasInfo   = wo.customer_symptoms || wo.diagnosis || wo.notes;

      woDetailSection = `
        <div class="detail-card">
          <div class="detail-card-header">
            <i class="bi bi-file-earmark-text"></i>
            <h6>Tu orden de trabajo</h6>
          </div>
          <div class="detail-card-body">
            ${hasInfo ? `
              ${wo.customer_symptoms ? `<div class="field-row"><div class="field-label">Síntomas reportados</div><div class="field-val">${escapeHtml(wo.customer_symptoms)}</div></div>` : ""}
              ${wo.diagnosis         ? `<div class="field-row"><div class="field-label">Diagnóstico del taller</div><div class="field-val">${escapeHtml(wo.diagnosis)}</div></div>` : ""}
              ${wo.notes             ? `<div class="field-row"><div class="field-label">Notas</div><div class="field-val">${escapeHtml(wo.notes)}</div></div>` : ""}
              ${hasLines ? `<hr style="border-color:rgba(255,255,255,.07);margin:14px 0;">` : ""}
            ` : ""}
            ${services.length ? `
              <div class="field-label mb-2"><i class="bi bi-wrench me-1"></i>Servicios</div>
              ${renderLineTable(services, "servicios")}
              ${products.length ? `<div style="height:14px;"></div>` : ""}
            ` : ""}
            ${products.length ? `
              <div class="field-label mb-2"><i class="bi bi-box me-1"></i>Productos</div>
              ${renderLineTable(products, "productos")}
            ` : ""}
            ${!hasInfo && !hasLines ? `<p class="text-muted small mb-0">Aún no hay información registrada en esta orden.</p>` : ""}
            ${wo.computed_total != null ? `
              <div class="total-row">
                <span class="total-label">Total calculado</span>
                <span class="total-val">${escapeHtml(money(wo.computed_total))}</span>
              </div>` : ""}
          </div>
        </div>`;
    }

    // ── Sidebar: mensaje del taller (prominente, con acento dorado)
    const adminMsgCard = appt.admin_message ? `
      <div class="msg-card">
        <div class="msg-card-header">
          <i class="bi bi-chat-left-text"></i>Mensaje del taller
        </div>
        <div class="msg-card-body">${escapeHtml(appt.admin_message)}</div>
      </div>` : "";

    // ── Sidebar: detalles rápidos en pills
    const quickPills = [
      slotTime ? `
        <div class="appt-meta-pill">
          <i class="bi bi-calendar3"></i>
          <div>
            <span class="pill-label">Fecha de la cita</span>
            <span class="pill-val">${escapeHtml(fmt(slotTime))}</span>
          </div>
        </div>` : "",
      appt.service_name ? `
        <div class="appt-meta-pill">
          <i class="bi bi-wrench"></i>
          <div>
            <span class="pill-label">Servicio</span>
            <span class="pill-val">${escapeHtml(appt.service_name)}</span>
          </div>
        </div>` : "",
      appt.requested_work ? `
        <div class="appt-meta-pill">
          <i class="bi bi-card-text"></i>
          <div>
            <span class="pill-label">Trabajo solicitado</span>
            <span class="pill-val">${escapeHtml(appt.requested_work)}</span>
          </div>
        </div>` : "",
      appt.notes ? `
        <div class="appt-meta-pill">
          <i class="bi bi-sticky"></i>
          <div>
            <span class="pill-label">Notas</span>
            <span class="pill-val">${escapeHtml(appt.notes)}</span>
          </div>
        </div>` : "",
    ].filter(Boolean).join("");

    // ── Sidebar: botón cancelar
    const cancelBtn = cancellable ? `
      <button class="btn-cancel mt-2" id="btnCancel" data-id="${escapeHtml(appt.appointment_id)}">
        <i class="bi bi-x-circle"></i>Cancelar esta cita
      </button>` : "";

    // Detalles de la cita en card contenedora (simetría con las del main)
    const sidebarInfoCard = quickPills ? `
      <div class="sidebar-info-card">
        <div class="sidebar-info-card-header">
          <i class="bi bi-info-circle-fill"></i>Detalles de la cita
        </div>
        <div class="sidebar-info-card-body">
          ${quickPills}
        </div>
      </div>` : "";

    // Sin OT
    const noWoCard = !wo ? `
      <div class="detail-card">
        <div class="detail-card-header">
          <i class="bi bi-hourglass-split"></i>
          <h6>Estado</h6>
        </div>
        <div class="detail-card-body">
          <div class="appt-confirmed-msg">
            <i class="bi bi-calendar-check-fill"></i>
            Tu cita está confirmada
          </div>
          <p class="small mt-3 mb-0" style="color:var(--text-muted);">El taller abrirá la orden de trabajo al recibir tu vehículo.</p>
        </div>
      </div>` : "";

    return `
      <!-- Hero: ancho completo -->
      <div class="mb-3">${heroCardHtml}</div>

      <!-- Columnas: Estado+OT (izq) | Sidebar sticky (der).
           Main primero en DOM → en mobile: WO status antes que detalles. -->
      <div class="detail-columns">

        <!-- Main izq: Estado + OT (primero en DOM = primero en mobile) -->
        <div class="detail-main-col">
          ${woStatusSection}
          ${woDetailSection}
          ${noWoCard}
        </div>

        <!-- Sidebar derecha -->
        <div class="detail-sidebar-col">
          ${adminMsgCard}
          ${sidebarInfoCard}
          ${cancelBtn ? `<hr style="border-color:rgba(255,255,255,.07);margin:14px 0 0;">` + cancelBtn : ""}
        </div>

      </div>`;
  }

  // ── Cancel ───────────────────────────────────────────────────────────────────
  document.getElementById("content").addEventListener("click", async (e) => {
    const btn = e.target.closest("#btnCancel");
    if (!btn) return;
    if (!confirm("¿Seguro que querés cancelar esta cita?")) return;
    try {
      await fetchJSON(`${API_BASE}/api/customer-appointments/${btn.dataset.id}/`, {
        method: "DELETE",
        headers: authHeaders()
      });
      showMsg("Cita cancelada correctamente.", "success");
      setTimeout(() => (window.location.href = "./appointments.html"), 1200);
    } catch (err) {
      showMsg(err.message || "No se pudo cancelar la cita.", "danger");
    }
  });

  // ── Auth / Nav ───────────────────────────────────────────────────────────────
  function logout() {
    localStorage.removeItem("customer_access_token");
    window.location.href = "../auth_client.html";
  }
  document.getElementById("btnLogout").addEventListener("click", logout);
  document.getElementById("btnLogoutMobile").addEventListener("click", logout);
  document.getElementById("btnMobileMenu").addEventListener("click", () => {
    document.getElementById("mobileDrawer").classList.toggle("open");
  });

  // ── Init ─────────────────────────────────────────────────────────────────────
  (async () => {
    if (!token) { window.location.href = "../auth_client.html"; return; }

    const appointmentId = new URLSearchParams(window.location.search).get("id");
    if (!appointmentId) {
      document.getElementById("content").innerHTML = `
        <div class="state-msg">
          <i class="bi bi-exclamation-triangle"></i>
          <p>No se especificó una cita. <a href="./appointments.html">Ver mis citas</a></p>
        </div>`;
      return;
    }

    // Customer name
    try {
      const me = await fetchJSON(`${API_BASE}/api/customer-auth/me/`, { headers: authHeaders() });
      document.getElementById("whoami").textContent = me?.full_name || me?.email || "Cliente";
    } catch (_) {}

    // Load appointment
    let appt;
    try {
      appt = await fetchJSON(`${API_BASE}/api/customer-appointments/${appointmentId}/`, { headers: authHeaders() });
    } catch (err) {
      document.getElementById("content").innerHTML = `
        <div class="state-msg">
          <i class="bi bi-calendar-x"></i>
          <p>No se encontró la cita. <a href="./appointments.html">Volver a mis citas</a></p>
        </div>`;
      return;
    }

    // Load work order if linked
    let wo = null;
    if (appt.work_order_id) {
      try {
        wo = await fetchJSON(`${API_BASE}/api/customer-work-orders/${appt.work_order_id}/`, { headers: authHeaders() });
      } catch (_) {
        // WO not accessible — render without it
      }
    }

    // Buscar imagen del vehículo por placa (misma lógica que vehicles.html)
    let vehicleImgUrl = null;
    try {
      const vData = await fetchJSON(`${API_BASE}/api/customer-vehicles/`, { headers: authHeaders() });
      const vRows = Array.isArray(vData) ? vData : (vData.results || []);
      const matched = vRows.find(v => v.plate === appt.vehicle_plate);
      if (matched?.image_url) vehicleImgUrl = matched.image_url;
    } catch (_) {
      // Sin imagen — fallback al ícono
    }

    document.getElementById("content").innerHTML = renderPage(appt, wo, vehicleImgUrl);
  })();
</script>
</body>
</html>
