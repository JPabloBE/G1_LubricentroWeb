<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cliente | Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">

  <style>
    body { background: #f8fafc; }

    /* ── Hero ── */
    .hero-section {
      background: linear-gradient(135deg, #f3f6ff 60%, #e8efff);
      border-bottom: 1px solid #dde5f5;
      padding: 36px 0 28px;
    }
    .hero-greeting {
      font-size: .82rem;
      font-weight: 700;
      color: #1d63ff;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px;
    }
    .hero-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.2;
      margin-bottom: 20px;
    }
    .btn-hero {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1d63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 30px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: background .18s;
    }
    .btn-hero:hover { background: #0a3ea6; color: #fff; }
    .btn-hero-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1d63ff;
      font-size: .9rem;
      font-weight: 700;
      text-decoration: none;
      vertical-align: middle;
    }
    .btn-hero-ghost:hover { text-decoration: underline; color: #0a3ea6; }

    /* ── Section label ── */
    .section-label {
      font-size: .72rem;
      font-weight: 700;
      color: #6c7a94;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 14px;
    }

    /* ── Appointment cards ── */
    .appt-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 14px rgba(0,0,0,.08);
      background: #fff;
      overflow: hidden;
    }
    .appt-card-accent {
      height: 5px;
      background: #1d63ff;
    }
    .appt-card-accent.ready { background: #16a34a; }
    .appt-card-body { padding: 20px 22px 22px; }

    .appt-card-plate {
      font-size: .72rem;
      font-weight: 700;
      color: #6c7a94;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .appt-card-vehicle {
      font-size: 1.08rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 2px;
    }
    .appt-card-date {
      font-size: .83rem;
      color: #6c7a94;
    }
    .appt-card-date i { color: #1d63ff; }

    /* Progress */
    .wo-progress-wrap { margin: 16px 0 4px; }
    .wo-progress-bar {
      height: 8px;
      border-radius: 99px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .wo-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: #1d63ff;
      transition: width .5s ease;
    }
    .wo-progress-fill.ready { background: #16a34a; }
    .wo-progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .wo-progress-label {
      font-size: .8rem;
      font-weight: 700;
      color: #0f172a;
    }
    .wo-progress-pct {
      font-size: .75rem;
      font-weight: 700;
      color: #6c7a94;
    }
    .wo-progress-pct.ready { color: #16a34a; }
    .wo-mechanic-note {
      display: flex; align-items: flex-start; gap: 6px;
      margin-top: 8px; padding: 7px 10px;
      background: #f8fafc; border-left: 3px solid #1d63ff;
      border-radius: 0 6px 6px 0;
      font-size: .78rem; color: #374151; line-height: 1.4;
    }
    .wo-mechanic-note i { color: #1d63ff; margin-top: 1px; flex-shrink: 0; }

    /* No-OT message */
    .appt-confirmed-msg {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f7ff;
      color: #1d63ff;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: .82rem;
      font-weight: 600;
      margin: 14px 0 4px;
    }

    /* Action row */
    .appt-card-actions {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .appt-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .75rem;
      font-weight: 700;
    }
    .badge-pending  { background: #fef9c3; color: #854d0e; }
    .badge-active   { background: #dbeafe; color: #1e40af; }
    .badge-ready    { background: #dcfce7; color: #14532d; }

    .btn-card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .82rem;
      font-weight: 700;
      color: #1d63ff;
      text-decoration: none;
    }
    .btn-card-link:hover { text-decoration: underline; color: #0a3ea6; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6c7a94;
    }
    .empty-state i { font-size: 3rem; color: #cbd5e1; display: block; margin-bottom: 14px; }
    .empty-state p { font-size: .95rem; margin-bottom: 20px; }

    /* Nav user */
    .nav-user {
      display: flex; align-items: center; gap: 12px; margin-left: auto;
    }
    .nav-user-name { color: rgba(255,255,255,.75); font-size: .875rem; font-weight: 500; }
    .btn-logout {
      background: rgba(255,255,255,.12); color: #fff;
      border: 1px solid rgba(255,255,255,.25); border-radius: 6px;
      padding: 5px 14px; font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(255,255,255,.22); }

    /* Alert */
    #msg { border-radius: 8px; }

    @media (max-width: 767px) {
      .topbar-info { display: none !important; }
      .hero-section { padding: 24px 0 20px; }
      .hero-title { font-size: 1.35rem; }
      .btn-hero-ghost { display: none; }
    }
  </style>
</head>

<body>

  <!-- ══ TOPBAR ══ -->
  <header class="topbar">
    <div class="container d-flex align-items-center justify-content-between gap-3">
      <a class="brand text-decoration-none" href="../index.html">
        <img class="brand-logo" src="../assets/img/logo.png" alt="Lubricentro">
      </a>
      <div class="topbar-info d-none d-md-flex align-items-center gap-4">
        <div class="info-chip">
          <div class="info-icon"><i class="bi bi-telephone"></i></div>
          <div>
            <div class="info-label">¡Llámanos ahora!</div>
            <div class="info-value">+(506) 2443-6139</div>
          </div>
        </div>
        <div class="info-chip">
          <div class="info-icon"><i class="bi bi-clock"></i></div>
          <div>
            <div class="info-label">Horario de atención</div>
            <div class="info-value">Lun-Sáb : 09:00-19:00</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ══ MAINNAV ══ -->
  <nav class="mainnav">
    <div class="container d-flex align-items-center">
      <ul class="navlinks d-none d-lg-flex">
        <li><a class="active" href="./dashboard.html">Dashboard</a></li>
        <li><a href="./appointments.html">Mis Citas</a></li>
        <li><a href="./vehicles.html">Mis Autos</a></li>
        <li><a href="./work_orders.html">Órdenes</a></li>
      </ul>

      <button class="btn btn-sm btn-outline-light ms-auto d-lg-none" id="btnMobileMenu" type="button">
        <i class="bi bi-list"></i>
      </button>

      <div class="nav-user d-none d-lg-flex">
        <span class="nav-user-name" id="whoami"></span>
        <button class="btn-logout" id="btnLogout">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button>
      </div>
    </div>

    <div class="mobile-drawer" id="mobileDrawer">
      <a class="active" href="./dashboard.html">Dashboard</a>
      <a href="./appointments.html">Mis Citas</a>
      <a href="./vehicles.html">Mis Autos</a>
      <a href="./work_orders.html">Órdenes</a>
      <a href="#" id="btnLogoutMobile" style="color:#ffc107;">Cerrar sesión</a>
    </div>
  </nav>

  <!-- ══ HERO ══ -->
  <section class="hero-section">
    <div class="container">
      <div class="hero-greeting">Portal Cliente</div>
      <div class="hero-title">Bienvenido/a, <span id="whoamiHero">—</span></div>
      <div class="d-flex align-items-center flex-wrap gap-3">
        <a class="btn-hero" href="./appointments.html">
          <i class="bi bi-plus-circle-fill"></i>Agendar nueva cita
        </a>
        <a class="btn-hero-ghost" href="./vehicles.html">
          Mis autos <i class="bi bi-arrow-right"></i>
        </a>
      </div>
    </div>
  </section>

  <!-- ══ MAIN ══ -->
  <main class="container py-4">
    <div id="msg" class="alert d-none" role="alert"></div>

    <div class="section-label">Tus citas activas</div>
    <div id="apptList" class="row g-3"></div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE = "http://127.0.0.1:8000";
  const token   = localStorage.getItem("customer_access_token");

  const ME_URL   = `${API_BASE}/api/customer-auth/me/`;
  const AP_URL   = `${API_BASE}/api/customer-appointments/`;
  const WO_URL   = `${API_BASE}/api/customer-work-orders/`;

  function authHeaders() {
    return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
  }

  function showMsg(text, type = "danger") {
    const el = document.getElementById("msg");
    el.className = `alert alert-${type}`;
    el.textContent = text;
    el.classList.remove("d-none");
  }

  async function fetchJSON(url, options = {}) {
    const res = await fetch(url, options);
    let data = null;
    try { data = await res.json(); } catch (_) {}
    if (!res.ok) {
      const detail = data?.detail || res.statusText || `HTTP ${res.status}`;
      const err = new Error(detail);
      err.status = res.status;
      throw err;
    }
    return data;
  }

  function normalizeList(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.results)) return data.results;
    return [];
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function fmtDate(dt) {
    if (!dt) return "—";
    try {
      return new Date(dt).toLocaleDateString("es-CR", {
        weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit"
      });
    } catch (_) { return dt; }
  }

  // ── WO progress ──────────────────────────────────────────────
  const WO_PROGRESS = {
    open:                   { pct: 25, label: "Recibimos tu vehículo" },
    diagnosing:             { pct: 25, label: "Revisando tu vehículo" },
    awaiting_authorization: { pct: 50, label: "Esperando tu autorización" },
    authorized:             { pct: 50, label: "Listo para iniciar reparación" },
    in_progress:            { pct: 75, label: "Trabajando en tu vehículo" },
    waiting_parts:          { pct: 75, label: "Esperando repuestos" },
    ready:                  { pct: 100, label: "¡Listo para retirar!" },
  };

  const ACTIVE_AP_STATUSES = new Set(["pending","scheduled","accepted","in_progress","confirmed"]);

  function apptStatusBadge(status) {
    const s = (status || "").toLowerCase();
    if (s === "pending") return `<span class="appt-status-badge badge-pending"><i class="bi bi-clock"></i>Pendiente de confirmación</span>`;
    if (["ready"].includes(s)) return `<span class="appt-status-badge badge-ready"><i class="bi bi-check-circle-fill"></i>Listo</span>`;
    return `<span class="appt-status-badge badge-active"><i class="bi bi-calendar-check"></i>Confirmada</span>`;
  }

  function renderProgressBlock(wo) {
    if (!wo) {
      return `<div class="appt-confirmed-msg"><i class="bi bi-calendar-check-fill"></i>Tu cita está confirmada</div>`;
    }

    const s = wo.status || "";
    const prog = WO_PROGRESS[s] || { pct: 0, label: s };
    const isReady = s === "ready";
    const fillClass = isReady ? "ready" : "";
    const pctClass  = isReady ? "ready" : "";

    const mechanicNote = (wo.notes || "").trim();
    return `
      <div class="wo-progress-wrap">
        <div class="wo-progress-bar">
          <div class="wo-progress-fill ${fillClass}" style="width:${prog.pct}%"></div>
        </div>
        <div class="wo-progress-meta">
          <span class="wo-progress-label">${escapeHtml(prog.label)}</span>
          <span class="wo-progress-pct ${pctClass}">${prog.pct}%</span>
        </div>
        ${mechanicNote ? `<div class="wo-mechanic-note"><i class="bi bi-chat-left-text"></i>${escapeHtml(mechanicNote)}</div>` : ""}
      </div>
    `;
  }

  function renderCard(appt, wo) {
    const isReady = wo?.status === "ready";
    const accentClass = isReady ? "ready" : "";
    const vehicle = [appt.vehicle_make, appt.vehicle_model].filter(Boolean).join(" ") || "Vehículo";
    const plate   = appt.vehicle_plate || "";

    return `
      <div class="col-12 col-md-6 col-xl-4">
        <div class="appt-card">
          <div class="appt-card-accent ${accentClass}"></div>
          <div class="appt-card-body">
            <div class="appt-card-plate">${escapeHtml(plate)}</div>
            <div class="appt-card-vehicle">${escapeHtml(vehicle)}</div>
            <div class="appt-card-date">
              <i class="bi bi-calendar3"></i>
              ${escapeHtml(fmtDate(appt.scheduled_start))}
            </div>
            ${renderProgressBlock(wo)}
            <div class="appt-card-actions">
              ${apptStatusBadge(appt.status)}
              <a class="btn-card-link" href="./appointment_detail.html?id=${escapeHtml(appt.appointment_id)}">
                Ver detalle <i class="bi bi-arrow-right"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderEmptyState() {
    return `
      <div class="col-12">
        <div class="empty-state">
          <i class="bi bi-calendar-x"></i>
          <p>No tenés citas activas en este momento</p>
          <a class="btn-hero" href="./appointments.html">
            <i class="bi bi-plus-circle-fill"></i>Agendar una cita
          </a>
        </div>
      </div>
    `;
  }

  function logout() {
    localStorage.removeItem("customer_access_token");
    window.location.href = "../auth_client.html";
  }

  document.getElementById("btnLogout").addEventListener("click", logout);
  document.getElementById("btnLogoutMobile").addEventListener("click", logout);
  document.getElementById("btnMobileMenu").addEventListener("click", () => {
    document.getElementById("mobileDrawer").classList.toggle("open");
  });

  (async () => {
    if (!token) { window.location.href = "../auth_client.html"; return; }

    // Auth check
    try {
      const me = await fetchJSON(ME_URL, { headers: authHeaders() });
      const label = me?.full_name || me?.email || "Cliente";
      document.getElementById("whoami").textContent     = label;
      document.getElementById("whoamiHero").textContent = label;
    } catch (err) {
      showMsg("Sesión inválida o expirada. Iniciá sesión nuevamente.", "warning");
      localStorage.removeItem("customer_access_token");
      setTimeout(() => (window.location.href = "../auth_client.html"), 900);
      return;
    }

    // Load appointments + work orders in parallel
    let appointments = [], workOrders = [];
    try {
      const [apData, woData] = await Promise.all([
        fetchJSON(AP_URL, { headers: authHeaders() }),
        fetchJSON(WO_URL, { headers: authHeaders() }),
      ]);
      appointments = normalizeList(apData);
      workOrders   = normalizeList(woData);
    } catch (err) {
      showMsg("No se pudo cargar la información. Intentá de nuevo.", "warning");
      return;
    }

    // Index WOs by work_order_id (appointments already carry work_order_id)
    const woById = {};
    workOrders.forEach(wo => {
      if (wo.work_order_id) woById[wo.work_order_id] = wo;
    });

    // Filter active appointments
    const active = appointments.filter(a => ACTIVE_AP_STATUSES.has((a.status || "").toLowerCase()));

    // Render
    const list = document.getElementById("apptList");
    if (!active.length) {
      list.innerHTML = renderEmptyState();
      return;
    }

    list.innerHTML = active.map(a => {
      const wo = a.work_order_id ? (woById[a.work_order_id] || null) : null;
      return renderCard(a, wo);
    }).join("");
  })();
</script>
</body>
</html>
