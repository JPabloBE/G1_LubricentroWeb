<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cliente | Mis Autos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/client.css">
</head>

<body>

  <!-- ══ TOPBAR ══ -->
  <header class="topbar">
    <div class="container d-flex align-items-center justify-content-between gap-3">
      <a class="brand text-decoration-none" href="../index.html">
        <img class="brand-logo" src="../assets/img/logo.png" alt="Lubricentro">
      </a>
      <div class="topbar-info d-none d-md-flex align-items-center gap-4">
        <div class="info-chip">
          <div class="info-icon"><i class="bi bi-telephone"></i></div>
          <div>
            <div class="info-label">¡Llámanos ahora!</div>
            <div class="info-value">+(506) 2443-6139</div>
          </div>
        </div>
        <div class="info-chip">
          <div class="info-icon"><i class="bi bi-clock"></i></div>
          <div>
            <div class="info-label">Horario de atención</div>
            <div class="info-value">Lun-Sáb : 09:00-19:00</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ══ MAINNAV ══ -->
  <nav class="mainnav">
    <div class="container d-flex align-items-center">
      <ul class="navlinks d-none d-lg-flex">
        <li><a href="./dashboard.html">Dashboard</a></li>
        <li><a href="./appointments.html">Mis Citas</a></li>
        <li><a class="active" href="./vehicles.html">Mis Autos</a></li>
      </ul>
      <button class="btn btn-sm btn-outline-light ms-auto d-lg-none" id="btnMobileMenu" type="button">
        <i class="bi bi-list"></i>
      </button>
      <div class="nav-user d-none d-lg-flex">
        <div class="notif-wrap">
          <button class="btn-notif-bell" id="btnNotifBell" title="Notificaciones">
            <i class="bi bi-bell"></i>
            <span class="notif-count" id="notifCount"></span>
          </button>
          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-dd-header"><i class="bi bi-bell me-1"></i>Recordatorios</div>
            <div id="notifList"><div class="notif-empty">Sin recordatorios pendientes</div></div>
          </div>
        </div>
        <span class="nav-user-name" id="whoami"></span>
        <button class="btn-logout" id="btnLogout">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button>
      </div>
    </div>
    <div class="mobile-drawer" id="mobileDrawer">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./appointments.html">Mis Citas</a>
      <a class="active" href="./vehicles.html">Mis Autos</a>
      <a href="#" id="btnLogoutMobile" style="color:#ffc107;">Cerrar sesión</a>
    </div>
  </nav>

  <!-- ══ PAGE BANNER ══ -->
  <section class="page-banner">
    <div class="container">
      <div class="page-eyebrow">Mis Autos</div>
      <div class="page-title">Mis Vehículos</div>
      <div class="page-sub">Todos los vehículos asociados a tu cuenta.</div>
    </div>
  </section>

  <!-- ══ MAIN ══ -->
  <main class="container py-4">
    <div id="msg" class="alert d-none" role="alert"></div>

    <div class="section-header mb-3">
      <span class="section-label">Vehículos registrados</span>
      <button class="btn-reload" id="btnReload">
        <i class="bi bi-arrow-clockwise"></i> Recargar
      </button>
    </div>

    <div class="vehicle-grid" id="vehicleGrid"></div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/toast.js"></script>
<script>
  const API_BASE = "http://127.0.0.1:8000";
  const token = localStorage.getItem("customer_access_token");

  function showMsg(text, type = "danger") { showToast(text, type); }

  async function fetchJSON(url, options = {}) {
    const res = await fetch(url, options);
    let data = null;
    try { data = await res.json(); } catch (_) {}
    if (!res.ok) throw new Error(data?.detail || JSON.stringify(data) || res.statusText);
    return data;
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  async function loadVehicles() {
    const data = await fetchJSON(`${API_BASE}/api/customer-vehicles/`, {
      headers: { "Authorization": `Bearer ${token}` }
    });

    const rows = Array.isArray(data) ? data : (data.results || []);
    const vehicleGrid = document.getElementById("vehicleGrid");
    vehicleGrid.innerHTML = "";

    if (!rows.length) {
      vehicleGrid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <i class="bi bi-car-front"></i>
          <p>No tenés vehículos registrados en tu cuenta.</p>
        </div>`;
      return;
    }

    for (const v of rows) {
      const card = document.createElement("div");
      card.className = "vehicle-card";
      card.innerHTML = `
        ${v.image_url
          ? `<img class="vehicle-card-img" src="${escapeHtml(v.image_url)}" alt="${escapeHtml(v.plate)}" onerror="this.parentNode.innerHTML='<div class=\\"vehicle-card-img-placeholder\\"><i class=\\"bi bi-car-front\\"></i></div>'">`
          : `<div class="vehicle-card-img-placeholder"><i class="bi bi-car-front"></i></div>`
        }
        <div class="vehicle-card-body">
          <div class="vehicle-card-plate">${escapeHtml(v.plate)}</div>
          <div class="vehicle-card-name">${escapeHtml([v.make, v.model].filter(Boolean).join(" ") || "Vehículo")}</div>
          ${v.year ? `<div class="vehicle-card-year">${escapeHtml(String(v.year))}</div>` : ""}
          <a class="stretched-link" href="./vehicle_history.html?plate=${encodeURIComponent(v.plate)}" aria-label="Ver historial de ${escapeHtml(v.plate)}"></a>
        </div>
      `;
      vehicleGrid.appendChild(card);
    }
  }

  function logout() {
    localStorage.removeItem("customer_access_token");
    window.location.href = "../auth_client.html";
  }

  document.getElementById("btnReload").addEventListener("click", () => loadVehicles());
  document.getElementById("btnLogout").addEventListener("click", logout);
  document.getElementById("btnLogoutMobile").addEventListener("click", logout);
  document.getElementById("btnMobileMenu").addEventListener("click", () => {
    document.getElementById("mobileDrawer").classList.toggle("open");
  });

  // Notification bell toggle
  document.getElementById("btnNotifBell").addEventListener("click", (e) => {
    e.stopPropagation();
    document.getElementById("notifDropdown").classList.toggle("open");
  });
  document.addEventListener("click", () => {
    document.getElementById("notifDropdown").classList.remove("open");
  });
  document.getElementById("notifDropdown").addEventListener("click", (e) => e.stopPropagation());

  (async () => {
    if (!token) {
      window.location.href = "../auth_client.html";
      return;
    }

    try {
      const me = await fetchJSON(`${API_BASE}/api/customer-auth/me/`, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      document.getElementById("whoami").textContent = me?.full_name || me?.email || "Cliente";
    } catch (_) {}

    try {
      await loadVehicles();
    } catch (err) {
      showMsg("Sesión inválida o expirada. Iniciá sesión nuevamente.", "warning");
      setTimeout(() => (window.location.href = "../auth_client.html"), 900);
    }
  })();
</script>
</body>
</html>
