<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | Reporte Inventario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Admin | Reporte Inventario</span>
    <button id="btnLogout" class="btn btn-warning btn-sm">Logout</button>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <aside class="col-12 col-md-3 col-lg-2 bg-white border-end" style="min-height:calc(100vh - 56px);">
      <div class="p-3">
        <div class="fw-semibold">Menú</div>
        <hr>
        <div class="list-group">
          <a class="list-group-item list-group-item-action" href="./dashboard.html">Dashboard</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_catalog.html">Catálogo</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_staff_users.html">Usuarios</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_vehicles.html">Autos</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_appointments.html">Citas</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_appointment_slots.html">Horarios de Citas</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_work_orders.html">Órdenes de Trabajo</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_cash_register.html">Caja</a>
          <a class="list-group-item list-group-item-action" href="./dashboard_period_closures.html">Cierres de Periodo</a>
          <a class="list-group-item list-group-item-action active" href="./dashboard_inventory_report.html">Reporte Inventario</a>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="col-12 col-md-9 col-lg-10 p-4">
      <div id="notAllowed" class="alert alert-danger d-none"></div>

      <div id="app" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">Reporte de Inventario</h4>
          <button class="btn btn-success btn-sm" id="btnExport">
            <i class="bi bi-file-earmark-excel me-1"></i>Exportar Excel
          </button>
        </div>

        <!-- Filtros -->
        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md-3">
                <label class="form-label small mb-1">Categoría</label>
                <select class="form-select form-select-sm" id="fCategory">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="col-12 col-md-2">
                <label class="form-label small mb-1">Estado de stock</label>
                <select class="form-select form-select-sm" id="fStockStatus">
                  <option value="">Todos</option>
                  <option value="critical">Stock crítico (&lt; umbral)</option>
                  <option value="out">Sin stock</option>
                  <option value="ok">Normal</option>
                </select>
              </div>
              <div class="col-6 col-md-1">
                <label class="form-label small mb-1">Umbral</label>
                <input class="form-control form-control-sm" id="fThreshold" type="number" min="0" value="5">
              </div>
              <div class="col-12 col-md-2">
                <label class="form-label small mb-1">Ordenar por</label>
                <select class="form-select form-select-sm" id="fSort">
                  <option value="name_asc">Nombre A-Z</option>
                  <option value="stock_asc">Stock menor → mayor</option>
                  <option value="stock_desc">Stock mayor → menor</option>
                </select>
              </div>
              <div class="col-12 col-md-2">
                <label class="form-label small mb-1">Estado</label>
                <select class="form-select form-select-sm" id="fActive">
                  <option value="true">Activos</option>
                  <option value="">Todos</option>
                  <option value="false">Inactivos</option>
                </select>
              </div>
              <div class="col-12 col-md-auto d-flex gap-2">
                <button class="btn btn-primary btn-sm" id="btnApply">
                  <i class="bi bi-search me-1"></i>Aplicar
                </button>
                <button class="btn btn-outline-secondary btn-sm" id="btnClear">
                  <i class="bi bi-x-lg"></i> Limpiar
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Resumen -->
        <div class="row g-3 mb-3" id="summaryRow"></div>

        <!-- Tabla -->
        <div class="card shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Nombre</th>
                    <th>SKU</th>
                    <th>Categoría</th>
                    <th class="text-end">Costo</th>
                    <th class="text-end">Precio</th>
                    <th class="text-end">Stock</th>
                    <th>Estado</th>
                    <th>Activo</th>
                  </tr>
                </thead>
                <tbody id="reportBody">
                  <tr><td colspan="8" class="text-center text-muted py-4">Cargando...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <p class="text-muted small mt-2" id="countLabel"></p>
      </div><!-- /app -->
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script>
const API = "http://127.0.0.1:8000/api";
let token = null;
let allProducts = [];
let allCategories = [];
let displayedProducts = [];

function authHeaders() { return { "Content-Type": "application/json", "Authorization": "Bearer " + token }; }
function normalizeList(r) { return Array.isArray(r) ? r : (r?.results ?? []); }

// ── Auth ─────────────────────────────────────────────────────────────────────
async function checkAuth() {
  token = localStorage.getItem("access_token");
  if (!token) { showNotAllowed("No autenticado."); return; }
  try {
    const r = await fetch(`${API}/auth/me/`, { headers: authHeaders() });
    if (!r.ok) { showNotAllowed("Sesión inválida."); return; }
    const u = await r.json();
    if (u.user_type !== "admin" && !u.is_staff && !u.is_superuser) { showNotAllowed("Acceso solo para administradores."); return; }
    document.getElementById("app").classList.remove("d-none");
    init();
  } catch { showNotAllowed("Error de conexión."); }
}

function showNotAllowed(msg) {
  const el = document.getElementById("notAllowed");
  el.textContent = msg;
  el.classList.remove("d-none");
}

document.getElementById("btnLogout").addEventListener("click", () => {
  localStorage.removeItem("access_token");
  localStorage.removeItem("refresh_token");
  location.href = "./auth.html";
});

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadCategories(), loadProducts()]);
  applyFilters();
}

async function loadCategories() {
  const r = await fetch(`${API}/catalog/categories/`, { headers: authHeaders() });
  allCategories = normalizeList(await r.json());
  const sel = document.getElementById("fCategory");
  sel.innerHTML = '<option value="">Todas</option>' +
    allCategories.map(c => `<option value="${c.category_id}">${c.name}</option>`).join("");
}

async function loadProducts() {
  const r = await fetch(`${API}/catalog/products/`, { headers: authHeaders() });
  allProducts = normalizeList(await r.json());
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const catId      = document.getElementById("fCategory").value;
  const stockStatus = document.getElementById("fStockStatus").value;
  const threshold  = parseFloat(document.getElementById("fThreshold").value) || 5;
  const sort       = document.getElementById("fSort").value;
  const activeVal  = document.getElementById("fActive").value;

  let filtered = [...allProducts];

  if (catId)      filtered = filtered.filter(p => p.category_id === catId || (!catId));
  if (catId)      filtered = filtered.filter(p => (p.category_id || "") === catId);
  if (activeVal !== "") filtered = filtered.filter(p => String(p.is_active) === activeVal);

  const stock = p => parseFloat(p.stock_qty);
  if (stockStatus === "out")      filtered = filtered.filter(p => stock(p) <= 0);
  else if (stockStatus === "critical") filtered = filtered.filter(p => stock(p) > 0 && stock(p) <= threshold);
  else if (stockStatus === "ok")  filtered = filtered.filter(p => stock(p) > threshold);

  if (sort === "stock_asc")  filtered.sort((a, b) => stock(a) - stock(b));
  else if (sort === "stock_desc") filtered.sort((a, b) => stock(b) - stock(a));
  else filtered.sort((a, b) => a.name.localeCompare(b.name, "es"));

  displayedProducts = filtered;
  renderTable(filtered, threshold);
  renderSummary(allProducts, threshold);
}

function renderSummary(products, threshold) {
  const total  = products.length;
  const active = products.filter(p => p.is_active).length;
  const out    = products.filter(p => parseFloat(p.stock_qty) <= 0).length;
  const crit   = products.filter(p => { const s = parseFloat(p.stock_qty); return s > 0 && s <= threshold; }).length;
  document.getElementById("summaryRow").innerHTML = `
    <div class="col-6 col-md-3">
      <div class="card text-center shadow-sm border-0">
        <div class="card-body py-2">
          <div class="fs-4 fw-bold">${total}</div>
          <div class="small text-muted">Productos totales</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center shadow-sm border-0">
        <div class="card-body py-2">
          <div class="fs-4 fw-bold text-success">${active}</div>
          <div class="small text-muted">Activos</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center shadow-sm border-0 border-warning">
        <div class="card-body py-2">
          <div class="fs-4 fw-bold text-warning">${crit}</div>
          <div class="small text-muted">Stock crítico</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center shadow-sm border-0 border-danger">
        <div class="card-body py-2">
          <div class="fs-4 fw-bold text-danger">${out}</div>
          <div class="small text-muted">Sin stock</div>
        </div>
      </div>
    </div>`;
}

function stockBadge(qty, threshold) {
  const s = parseFloat(qty);
  if (s <= 0)        return '<span class="badge bg-danger">Sin stock</span>';
  if (s <= threshold) return '<span class="badge bg-warning text-dark">Stock crítico</span>';
  return '<span class="badge bg-success">Normal</span>';
}

function fmt(n) {
  return Number(n).toLocaleString("es-CR", { style: "currency", currency: "CRC", minimumFractionDigits: 0 });
}

function renderTable(products, threshold) {
  const tbody = document.getElementById("reportBody");
  if (!products.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">No hay productos con los filtros aplicados.</td></tr>';
    document.getElementById("countLabel").textContent = "";
    return;
  }
  tbody.innerHTML = products.map(p => {
    const s = parseFloat(p.stock_qty);
    const rowCls = s <= 0 ? 'class="table-danger"' : (s <= threshold ? 'class="table-warning"' : '');
    return `<tr ${rowCls}>
      <td class="fw-semibold">${p.name}</td>
      <td class="text-muted small">${p.sku || "—"}</td>
      <td class="small">${p.category_name || "—"}</td>
      <td class="text-end small">${fmt(p.cost)}</td>
      <td class="text-end">${fmt(p.unit_price)}</td>
      <td class="text-end fw-bold">${s}</td>
      <td>${stockBadge(p.stock_qty, threshold)}</td>
      <td>${p.is_active ? '<span class="badge bg-success">Activo</span>' : '<span class="badge bg-secondary">Inactivo</span>'}</td>
    </tr>`;
  }).join("");
  document.getElementById("countLabel").textContent = `${products.length} producto${products.length !== 1 ? "s" : ""} mostrado${products.length !== 1 ? "s" : ""}.`;
}

// ── Botones filtros ───────────────────────────────────────────────────────────
document.getElementById("btnApply").addEventListener("click", applyFilters);
document.getElementById("btnClear").addEventListener("click", () => {
  document.getElementById("fCategory").value    = "";
  document.getElementById("fStockStatus").value = "";
  document.getElementById("fThreshold").value   = "5";
  document.getElementById("fSort").value        = "name_asc";
  document.getElementById("fActive").value      = "true";
  applyFilters();
});

// ── Excel export ──────────────────────────────────────────────────────────────
document.getElementById("btnExport").addEventListener("click", () => {
  if (!displayedProducts.length) { alert("No hay productos para exportar."); return; }
  const threshold = parseFloat(document.getElementById("fThreshold").value) || 5;
  const rows = displayedProducts.map(p => {
    const s = parseFloat(p.stock_qty);
    const estado = s <= 0 ? "Sin stock" : (s <= threshold ? "Stock crítico" : "Normal");
    return {
      "Nombre":    p.name,
      "SKU":       p.sku || "",
      "Categoría": p.category_name || "",
      "Costo":     parseFloat(p.cost),
      "Precio":    parseFloat(p.unit_price),
      "Stock":     s,
      "Estado":    estado,
      "Activo":    p.is_active ? "Sí" : "No",
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Inventario");
  XLSX.writeFile(wb, `inventario_${new Date().toISOString().slice(0, 10)}.xlsx`);
});

// ── Start ─────────────────────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
